kind: pipeline
type: docker
name: ci-cd

services:
  - name: mysql_test
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hospital_test
    command:
      - --default-authentication-plugin=mysql_native_password

steps:
  - name: seed-db
    image: mysql:8.0
    commands:
      - echo "Esperando MySQL..."
      - for i in `seq 1 60`; do mysql --ssl-mode=DISABLED -h mysql_test -uroot -prootpassword -e "SELECT 1" && break || sleep 2; done

      - echo "Cargando SQL..."
      - mysql --ssl-mode=DISABLED -h mysql_test -uroot -prootpassword -D hospital_test < setup_database.sql

      - echo "Tablas en hospital_test:"
      - mysql --ssl-mode=DISABLED -h mysql_test -uroot -prootpassword -D hospital_test -e "SHOW TABLES;"

  - name: test-backend
    image: php:8.2
    environment:
      DB_HOST: mysql_test
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: rootpassword
      DB_NAME: hospital_test
    commands:
      - apt-get update
      - apt-get install -y default-mysql-client libmariadb-dev
      - docker-php-ext-install mysqli pdo_mysql
      - php sistema_adfs/tests/seed_user.php
      - php sistema_adfs/phpunit.phar -c sistema_adfs/phpunit.xml

  - name: test-frontend
    image: node:20
    environment:
      CI: "true"
    commands:
      - cd HOSPITAL_SYSTEM_REACT
      - npm ci --no-audit --no-fund
      - npm test -- --watchAll=false

  - name: sonar-backend
    image: sonarsource/sonar-scanner-cli:latest
    environment:
      SONAR_TOKEN:
        from_secret: SONAR_TOKEN
      SONAR_HOST_URL:
        from_secret: SONAR_HOST_URL
    commands:
      - |
        set -e
        case "$DRONE_BRANCH" in
          dev)   KEY="osmc-be-dev" ;;
          uat)   KEY="osmc-be-uat" ;;
          main|master) KEY="osmc-be-prod" ;;
          *) echo "Branch $DRONE_BRANCH no tiene análisis Sonar"; exit 0 ;;
        esac
        cd sistema_adfs
        sonar-scanner \
          -Dsonar.host.url="$SONAR_HOST_URL" \
          -Dsonar.login="$SONAR_TOKEN" \
          -Dsonar.projectKey="$KEY" \
          -Dproject.settings=sonar-project.properties \
          -Dsonar.working.directory=/tmp/.scannerwork-be

  - name: sonar-frontend
    image: sonarsource/sonar-scanner-cli:latest
    environment:
      SONAR_TOKEN:
        from_secret: SONAR_TOKEN
      SONAR_HOST_URL:
        from_secret: SONAR_HOST_URL
    commands:
      - |
        set -e
        case "$DRONE_BRANCH" in
          dev)   KEY="osmc-fe-dev" ;;
          uat)   KEY="osmc-fe-uat" ;;
          main|master) KEY="osmc-fe-prod" ;;
          *) echo "Branch $DRONE_BRANCH no tiene análisis Sonar"; exit 0 ;;
        esac
        cd HOSPITAL_SYSTEM_REACT
        sonar-scanner \
          -Dsonar.host.url="$SONAR_HOST_URL" \
          -Dsonar.login="$SONAR_TOKEN" \
          -Dsonar.projectKey="$KEY" \
          -Dproject.settings=sonar-project.properties \
          -Dsonar.working.directory=/tmp/.scannerwork-fe
    
  - name: deploy-dev
    image: docker:24
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    commands:
      - docker compose -f docker-compose.deploy.yml --env-file envs/dev.env -p hospital_dev up -d --build
    when:
      branch:
        - dev

  - name: deploy-uat
    image: docker:24
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    commands:
      - docker compose -f docker-compose.deploy.yml --env-file envs/uat.env -p hospital_uat up -d --build
    when:
      branch:
        - uat

  - name: deploy-prod
    image: docker:24
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    commands:
      - docker compose -f docker-compose.deploy.yml --env-file envs/prod.env -p hospital_prod up -d --build
    when:
      branch:
        - main
        - master
  
  - name: notify-email-on-success
    image: drillster/drone-email
    settings:
      host: smtp.gmail.com
      port: 587
      username:
        from_secret: GMAIL_USER
      password:
        from_secret: GMAIL_APP_PASSWORD
      from:
        from_secret: GMAIL_USER
      to:
        - from_secret: EMAIL_TO_LEAD
      subject: "[DRONE] ✅✅✅✅✅©© Build exitoso ${DRONE_REPO} (${DRONE_BRANCH})"
      body: |
        ✅ El pipeline terminó correctamente.

        Repo: ${DRONE_REPO}
        Branch: ${DRONE_BRANCH}
        Build: ${DRONE_BUILD_NUMBER}
        Link: ${DRONE_BUILD_LINK}
        Commit: ${DRONE_COMMIT_SHA}
        Autor: ${DRONE_COMMIT_AUTHOR}

        Mensaje:
        ${DRONE_COMMIT_MESSAGE}
    when:
      status:
        - success
  
  - name: notify-email-on-failure
    image: drillster/drone-email
    settings:
      host: smtp.gmail.com
      port: 587
      username:
        from_secret: GMAIL_USER
      password:
        from_secret: GMAIL_APP_PASSWORD
      from:
        from_secret: GMAIL_USER
      recipients:
        - from_secret: EMAIL_TO_LEAD
      subject: "[DRONE] Falló ${DRONE_REPO} en ${DRONE_BRANCH} (#${DRONE_BUILD_NUMBER})"
      body: |
        Build: ${DRONE_BUILD_LINK}
        Repo: ${DRONE_REPO}
        Branch: ${DRONE_BRANCH}
        Commit: ${DRONE_COMMIT_SHA}
        Author: ${DRONE_COMMIT_AUTHOR}
        Message: ${DRONE_COMMIT_MESSAGE}
    when:
      status:
        - failure
        - killed
        - error

volumes:
  - name: dockersock
    host:
      path: /var/run/docker.sock