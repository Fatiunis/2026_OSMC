services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hospital_${ENV_NAME}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data_${ENV_NAME}:/var/lib/mysql

  backend:
    build: ./sistema_adfs
    ports:
      - "${BE_PORT}:80"
    environment:
      DB_HOST: mysql
      DB_NAME: hospital_${ENV_NAME}
      DB_USER: root
      DB_PASS: rootpassword
      DB_PORT: ${DB_PORT}
    depends_on:
      - mysql

  frontend:
    build: ./HOSPITAL_SYSTEM_REACT
    ports:
      - "${FE_PORT}:5173"
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend

volumes:
  mysql_data_dev:
  mysql_data_uat:
  mysql_data_prod: